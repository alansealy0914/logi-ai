services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: logiai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5435:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports: ["8004:8000"]
    env_file: .env
    depends_on: [postgres]

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports: ["4002:3000"]
    depends_on: [backend]

volumes:
  pgdata: