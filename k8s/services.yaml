apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: logiai
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: logiai
spec:
  selector:
    app: logiai-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: logiai
spec:
  selector:
    app: logiai-frontend
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer