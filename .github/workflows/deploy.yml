name: Deploy to AWS EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: logiai-eks
  NAMESPACE: logiai

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region:            ${{ env.AWS_REGION }}

    - name: Login to ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set ECR URLs
      run: |
        echo "BACKEND_ECR=${{ steps.ecr-login.outputs.registry }}/logiai-backend" >> $GITHUB_ENV
        echo "FRONTEND_ECR=${{ steps.ecr-login.outputs.registry }}/logiai-frontend" >> $GITHUB_ENV
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    - name: Build & push backend
      run: |
        docker build -t $BACKEND_ECR:$IMAGE_TAG -t $BACKEND_ECR:latest ./backend
        docker push $BACKEND_ECR:$IMAGE_TAG
        docker push $BACKEND_ECR:latest

    - name: Build & push frontend
      run: |
        docker build -t $FRONTEND_ECR:$IMAGE_TAG -t $FRONTEND_ECR:latest ./frontend
        docker push $FRONTEND_ECR:$IMAGE_TAG
        docker push $FRONTEND_ECR:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

    - name: Deploy to EKS
      run: |
        # Substitute ECR URLs into manifests
        sed -i "s|BACKEND_ECR_URL|$BACKEND_ECR|g"   k8s/backend-deployment.yaml
        sed -i "s|FRONTEND_ECR_URL|$FRONTEND_ECR|g" k8s/frontend-deployment.yaml

        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/secrets.yaml
        kubectl apply -f k8s/services.yaml
        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/frontend-deployment.yaml
        kubectl apply -f k8s/hpa.yaml

        # Substitute ACM cert ARN and domain into ingress
        ACM_CERT_ARN=$(cd terraform && terraform output -raw acm_certificate_arn)
        sed -i -e "s|ACM_CERT_ARN|$ACM_CERT_ARN|g" \
               -e "s|DOMAIN_NAME|${{ secrets.DOMAIN_NAME }}|g" \
               k8s/ingress.yaml
        kubectl apply -f k8s/ingress.yaml

        # Force rolling update with new image tag
        kubectl set image deployment/logiai-backend  backend=$BACKEND_ECR:$IMAGE_TAG  -n $NAMESPACE
        kubectl set image deployment/logiai-frontend frontend=$FRONTEND_ECR:$IMAGE_TAG -n $NAMESPACE

        kubectl rollout status deployment/logiai-backend  -n $NAMESPACE --timeout=120s
        kubectl rollout status deployment/logiai-frontend -n $NAMESPACE --timeout=120s

    - name: Print ALB URL
      run: |
        echo "App URL:"
        kubectl get ingress logiai-ingress -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
